# Network Context File — CCNA Extended ACL Lab
#
# FORMAT (Xumi-style SNMT):
#   Each entity maps to one or more gateway+interface+prefix tuples.
#   This is the ONLY network-specific information the LLM needs.
#   No aliases, no ACL placement rules, no port definitions.
#   The LLM reasons about everything else from its training knowledge.
#
# HOW TO USE:
#   Upload this file via POST /api/network before submitting intents.
#   Or place it in data/networks/ for auto-load on startup.

network_name: "CCNA Extended ACL Lab"
description: "Two-router, two-switch lab with three VLANs (Sales/Operations/Management)"

entities:

  Sales Network:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.40"
        prefix: "10.40.0.0/24"

  Operations Network:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.30"
        prefix: "10.30.0.0/24"

  Management Network:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.20"
        prefix: "10.20.0.0/24"

  Internet:
    gateways:
      - router: "R1"
        interface: "Loopback1"
        prefix: "172.16.1.0/24"

  PC-A:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.30"
        prefix: "10.30.0.10/32"

  PC-B:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.40"
        prefix: "10.40.0.10/32"

  R1:
    gateways:
      - router: "R1"
        interface: "GigabitEthernet0/0/1.20"
        prefix: "10.20.0.1/32"
      - router: "R1"
        interface: "GigabitEthernet0/0/1.30"
        prefix: "10.30.0.1/32"
      - router: "R1"
        interface: "GigabitEthernet0/0/1.40"
        prefix: "10.40.0.1/32"

  R2:
    gateways:
      - router: "R2"
        interface: "GigabitEthernet0/0/1"
        prefix: "10.20.0.4/32"

  S1:
    gateways:
      - router: "S1"
        interface: "Vlan20"
        prefix: "10.20.0.2/32"

  S2:
    gateways:
      - router: "S2"
        interface: "Vlan20"
        prefix: "10.20.0.3/32"
